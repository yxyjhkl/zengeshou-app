name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk wget unzip zip libffi-dev libssl-dev build-essential git python3-dev

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        # 不指定 packages，让 action 安装默认组件（后续手动补充需要的版本）

      - name: Install required SDK components (build-tools 31.0.0, platforms android-31)
        run: |
          # 定位 sdkmanager 的路径
          if [ -f "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          elif [ -f "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
          else
            echo "sdkmanager not found"
            exit 1
          fi

          # 安装需要的 build-tools 和 platforms
          yes | $SDKMANAGER "build-tools;31.0.0" "platforms;android-31" > /dev/null

          # 验证 aidl 是否存在
          if [ -f "$ANDROID_SDK_ROOT/build-tools/31.0.0/aidl" ]; then
            echo "✅ aidl found"
          else
            echo "❌ aidl not found"
            ls -la $ANDROID_SDK_ROOT/build-tools/
            exit 1
          fi

      - name: Add build-tools to PATH
        run: echo "$ANDROID_SDK_ROOT/build-tools/31.0.0" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython==0.29.37
          pip install buildozer==1.5.0
          pip install pdfplumber openpyxl pillow

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_SDK_ROOT: /opt/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
          retention-days: 7
