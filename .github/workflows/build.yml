name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jdk wget unzip zip libffi-dev libssl-dev build-essential git python3-dev

      # 手动下载 Android SDK 并整理目录结构
      - name: Download and install Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          rm commandlinetools-linux-9477386_latest.zip
          
          mv cmdline-tools latest
          mkdir -p cmdline-tools
          mv latest cmdline-tools/
          
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      # 创建软链接，让 Buildozer 能在旧路径找到 sdkmanager
      - name: Create symlink for legacy SDK structure
        run: |
          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest $ANDROID_SDK_ROOT/tools

      # 接受许可并安装所需组件
      - name: Accept licenses and install components
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;31.0.0" "platforms;android-31"

      # 验证 build-tools 是否安装成功
      - name: Verify build-tools
        run: |
          if [ -d "$ANDROID_SDK_ROOT/build-tools/31.0.0" ]; then
            echo "✅ build-tools 31.0.0 installed"
          else
            echo "❌ build-tools 31.0.0 not found"
            exit 1
          fi

      # 创建 Buildozer 默认路径的软链接（可选，增强兼容性）
      - name: Create symlink for Buildozer default path
        run: |
          mkdir -p /home/runner/.buildozer/android/platform
          ln -sf $HOME/android-sdk /home/runner/.buildozer/android/platform/android-sdk

      # 安装 Python 依赖
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython==0.29.37
          pip install buildozer==1.5.0
          pip install pdfplumber openpyxl pillow

      # 构建 APK（如果失败，后续步骤会手动运行 Gradle 以获取详细错误）
      - name: Build APK with verbose output
        id: build_apk
        continue-on-error: true
        run: |
          unset ANDROID_NDK ANDROID_NDK_HOME ANDROID_NDK_ROOT
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          buildozer android debug --verbose
        env:
          JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # 如果 Buildozer 失败，则进入 Gradle 项目目录手动执行 gradlew 获取详细错误
      - name: If build failed, run Gradle manually with stacktrace
        if: steps.build_apk.outcome == 'failure'
        run: |
          echo "Buildozer failed, attempting to run Gradle manually for detailed error..."
          GRADLE_DIR=$(find .buildozer -name "gradlew" -type f -exec dirname {} \; | head -1)
          if [ -d "$GRADLE_DIR" ]; then
            cd "$GRADLE_DIR"
            chmod +x gradlew
            echo "Running gradlew assembleDebug --stacktrace"
            ./gradlew assembleDebug --stacktrace
          else
            echo "No gradlew found in .buildozer"
            exit 1
          fi

      # 上传 APK（如果构建成功）
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
          retention-days: 7
