name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jdk wget unzip zip libffi-dev libssl-dev build-essential git python3-dev

      # 手动下载 Android SDK 并整理目录结构
      - name: Download and install Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          rm commandlinetools-linux-9477386_latest.zip
          
          # 将解压出的 cmdline-tools 目录重命名为 latest
          mv cmdline-tools latest
          # 创建最终的 cmdline-tools 目录，并将 latest 移入其中
          mkdir -p cmdline-tools
          mv latest cmdline-tools/
          
          # 验证目录结构
          ls -la $HOME/android-sdk/cmdline-tools/latest/bin/
          
          # 设置环境变量（供后续步骤使用）
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Accept Android licenses and install required components
        run: |
          # 接受所有许可
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          
          # 安装所需组件
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;31.0.0" "platforms;android-31"
          
          # 验证 build-tools 是否安装成功
          if [ -d "$ANDROID_SDK_ROOT/build-tools/31.0.0" ]; then
            echo "✅ build-tools 31.0.0 installed"
            ls -la $ANDROID_SDK_ROOT/build-tools/31.0.0/
          else
            echo "❌ build-tools 31.0.0 not found"
            echo "Contents of $ANDROID_SDK_ROOT/build-tools:"
            ls -la $ANDROID_SDK_ROOT/build-tools/ || echo "build-tools directory does not exist"
            exit 1
          fi

      - name: Configure buildozer.spec
        run: |
          # 添加 SDK 路径和 build-tools 版本（如果已存在则替换）
          if ! grep -q "^android.sdk_path" buildozer.spec; then
            echo "android.sdk_path = $HOME/android-sdk" >> buildozer.spec
          else
            sed -i "s|^android.sdk_path.*|android.sdk_path = $HOME/android-sdk|" buildozer.spec
          fi
          if ! grep -q "^android.build_tools_version" buildozer.spec; then
            echo "android.build_tools_version = 31.0.0" >> buildozer.spec
          else
            sed -i 's|^android.build_tools_version.*|android.build_tools_version = 31.0.0|' buildozer.spec
          fi
          # 确保 android.api 是整数
          sed -i 's|^android.api.*|android.api = 31|' buildozer.spec
          echo "buildozer.spec configuration:"
          grep -E "android\.(sdk_path|build_tools_version|api)" buildozer.spec

      - name: Create symlink for Buildozer default path (optional)
        run: |
          mkdir -p /home/runner/.buildozer/android/platform
          ln -sf $HOME/android-sdk /home/runner/.buildozer/android/platform/android-sdk

      - name: Add build-tools to PATH
        run: echo "$ANDROID_SDK_ROOT/build-tools/31.0.0" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython==0.29.37
          pip install buildozer==1.5.0
          pip install pdfplumber openpyxl pillow

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
          retention-days: 7
