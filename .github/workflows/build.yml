name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk wget unzip zip libffi-dev libssl-dev build-essential git python3-dev

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install required SDK components (build-tools 31.0.0, platforms android-31)
        run: |
          # 查找 sdkmanager（支持不同版本存放路径）
          SDKMANAGER=$(find $ANDROID_SDK_ROOT -name sdkmanager -type f 2>/dev/null | head -n1)
          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found"
            exit 1
          fi
          echo "Found sdkmanager at $SDKMANAGER"

          # 安装所需组件（自动接受许可）
          yes | $SDKMANAGER --licenses > /dev/null 2>&1
          yes | $SDKMANAGER "build-tools;31.0.0" "platforms;android-31" > /dev/null

          # 验证安装
          if [ -f "$ANDROID_SDK_ROOT/build-tools/31.0.0/aidl" ]; then
            echo "✅ aidl installed successfully"
          else
            echo "❌ aidl not found after manual installation"
            echo "Contents of build-tools:"
            ls -la $ANDROID_SDK_ROOT/build-tools/
            exit 1
          fi

      - name: Add build-tools to PATH and set environment variable
        run: |
          echo "$ANDROID_SDK_ROOT/build-tools/31.0.0" >> $GITHUB_PATH
          echo "ANDROID_BUILD_TOOLS=31.0.0" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython==0.29.37
          pip install buildozer==1.5.0
          pip install pdfplumber openpyxl pillow

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_SDK_ROOT: /opt/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
          retention-days: 7
