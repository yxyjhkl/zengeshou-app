name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jdk wget unzip zip libffi-dev libssl-dev build-essential git python3-dev

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install required SDK components (build-tools 31.0.0, platforms android-31)
        run: |
          # 查找 sdkmanager（路径可能因 action 版本而异）
          SDKMANAGER=$(find $ANDROID_SDK_ROOT -name sdkmanager -type f 2>/dev/null | head -n1)
          if [ -z "$SDKMANAGER" ]; then
            echo "❌ sdkmanager not found"
            exit 1
          fi
          echo "Found sdkmanager at $SDKMANAGER"

          # 安装所需组件（自动接受许可）
          yes | $SDKMANAGER --licenses > /dev/null 2>&1
          yes | $SDKMANAGER "build-tools;31.0.0" "platforms;android-31" > /dev/null

          # 验证 aidl 是否已安装
          if [ -f "$ANDROID_SDK_ROOT/build-tools/31.0.0/aidl" ]; then
            echo "✅ aidl installed successfully"
          else
            echo "❌ aidl not found after manual installation"
            echo "Contents of build-tools:"
            ls -la $ANDROID_SDK_ROOT/build-tools/
            exit 1
          fi

      - name: Configure buildozer.spec with correct SDK path and build-tools version
        run: |
          # 确保 buildozer.spec 中有正确的 SDK 路径和 build-tools 版本
          if ! grep -q "^android.sdk_path" buildozer.spec; then
            echo "android.sdk_path = /opt/android-sdk" >> buildozer.spec
          else
            sed -i 's|^android.sdk_path.*|android.sdk_path = /opt/android-sdk|' buildozer.spec
          fi
          if ! grep -q "^android.build_tools_version" buildozer.spec; then
            echo "android.build_tools_version = 31.0.0" >> buildozer.spec
          else
            sed -i 's|^android.build_tools_version.*|android.build_tools_version = 31.0.0|' buildozer.spec
          fi
          # 修正 android.api 为整数
          sed -i 's|^android.api.*|android.api = 31|' buildozer.spec
          # 打印确认
          echo "buildozer.spec configuration:"
          grep -E "android\.(sdk_path|build_tools_version|api)" buildozer.spec

      - name: Create symlink to SDK in Buildozer default location
        run: |
          mkdir -p /home/runner/.buildozer/android/platform
          ln -sf /opt/android-sdk /home/runner/.buildozer/android/platform/android-sdk
          ls -la /home/runner/.buildozer/android/platform/

      - name: Add build-tools to PATH
        run: echo "$ANDROID_SDK_ROOT/build-tools/31.0.0" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython==0.29.37
          pip install buildozer==1.5.0
          pip install pdfplumber openpyxl pillow

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
          ANDROID_SDK_ROOT: /opt/android-sdk
          ANDROID_HOME: /opt/android-sdk   # 额外设置 ANDROID_HOME 以兼容

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
          retention-days: 7
