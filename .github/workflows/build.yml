name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk wget unzip zip libffi-dev libssl-dev build-essential git
      - name: Accept Android SDK licenses run: | mkdir -p /opt/android-sdk/cmdline-tools cd /tmp wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip unzip -q cmdline-tools.zip mv cmdline-tools /opt/android-sdk/cmdline-tools/latest yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true export ANDROID_SDK_ROOT=/opt/android-sdk export PATH=$PATH:/opt/android-sdk/cmdline-tools/latest/bin yes | sdkmanager --licenses > /dev/null 2>&1 || true 
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython==0.29.37
          pip install buildozer==1.5.0
          pip install pdfplumber openpyxl pillow
          export ANDROID_SDK_ROOT=/opt/android-sdk export PATH=$PATH:/opt/android-sdk/cmdline-tools/latest/bin
      
      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
          retention-days: 7
